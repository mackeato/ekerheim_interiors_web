<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Greenery - Botanical Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nature's Greenery</h1>
        <p>A beautifully curated guide to indoor botanical wonders</p>
    </header>

    <div class="category-filters" id="category-filters">
        <!-- Buttons injected dynamically -->
    </div>

    <main>
        <div id="plant-grid" class="plant-grid">
            <!-- Plant cards dynamically injected -->
        </div>
    </main>

    <!-- Modal for detailed plant view -->
    <div id="plant-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="Plant Image">
                </div>
                <div class="modal-info">
                    <h2 id="modal-title">Plant Name</h2>
                    <h4 id="modal-scientific">Scientific Name</h4>
                    <p id="modal-desc">Description</p>
                    <div class="care-instructions">
                        <h3>Care Guide</h3>
                        <div class="care-item"><strong>Light:</strong> <span id="modal-light"></span></div>
                        <div class="care-item"><strong>Water:</strong> <span id="modal-water"></span></div>
                        <div class="care-item"><strong>Difficulty:</strong> <span id="modal-difficulty"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
